services:
  mongo:
    image: mongo:6
    container_name: emz-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: emz-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - emz-net

  backend:
    build: ./backend
    container_name: emz-backend
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    # volumes:
    #   - ./backend/src:/app/src
    depends_on:
      - mongo
      - ollama
    networks:
      - emz-net

  ml-service:
    build: ./ml-service
    container_name: emz-ml
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    # volumes:
    #   - ./ml-service/app:/app/app
    volumes:
      - ./ml-service/models:/app/models
    networks:
      - emz-net

  telegram-bot:
    build: ./telegram-bot
    container_name: emz-bot
    restart: always
    env_file: .env
    # volumes:
    #   - ./telegram-bot/src:/app/src
    depends_on:
      - backend
    networks:
      - emz-net

  frontend:
    build: ./frontend
    container_name: emz-frontend
    ports:
      - "5173:5173"
    env_file: .env
    depends_on:
      - backend
    networks:
      - emz-net

networks:
  emz-net:
    driver: bridge

volumes:
  mongo_data:
  ollama_data:
